<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora de Escalas</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <nav class="top-nav" aria-label="Navegacao principal">
      <a href="index.html">Início</a>
      <a href="escalas.html" aria-current="page">Escalas</a>
      <a href="frases.html">Frases</a>
    </nav>

    <main class="app-shell">
      <header class="app-header">
        <h1>Calculadora de Escalas</h1>
        <p>Ferramenta local para cálculo de escalas clínicas durante consulta.</p>
      </header>

      <section class="panel" aria-labelledby="scale-selection-title">
        <h2 id="scale-selection-title">Escala</h2>
        <label class="field-label" for="scale-select">Escolha a escala</label>
        <select id="scale-select">
          <option value="">Selecione uma escala</option>
        </select>
        <p id="scale-description" class="scale-description" aria-live="polite"></p>
      </section>

      <form id="scale-form" class="panel hidden" novalidate>
        <div id="questions-area"></div>

        <div class="actions">
          <button type="submit">Calcular resultado</button>
          <button type="button" id="clear-button" class="secondary">Limpar</button>
        </div>
      </form>

      <section id="result-area" class="panel result hidden" aria-live="polite" aria-labelledby="result-title">
        <h2 id="result-title">Resultado</h2>
        <dl id="result-list"></dl>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
